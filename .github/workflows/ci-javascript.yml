name: CI - JavaScript

on:
  push:
    paths:
      - kittynode-docs/**
      - kittynode-com/**
      - packages/app/*
      - packages/app/src/**

jobs:
  format-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Format and lint
        run: bun -F kittynode-docs -F app -F kittynode-com format-lint

      - name: Svelte check
        run: bun -F app -F kittynode-com check

      - name: Knip
        run: bun knip
